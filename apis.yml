apis:
  - aid: ditto-live:sdk
    name: Ditto SDK
    description: >-
      Multi-platform embeddable SDK for peer-to-peer and cloud-synced data
      storage. Supports Swift, Kotlin, Flutter, React Native, JavaScript,
      .NET/C#, C++, Rust, Go, and Java. Developers use DQL to create, read,
      update, delete, and observe documents that sync automatically over
      Bluetooth, WiFi Direct, LAN, and cloud transports.
    humanURL: https://docs.ditto.live/sdk/latest/home
    tags:
      - SDK
      - Peer-to-Peer
      - Offline-First
      - Database
    properties:
      - type: Documentation
        url: https://docs.ditto.live/sdk/latest/home
  - aid: ditto-live:cloud-http-api
    name: Ditto Cloud HTTP API
    description: >-
      REST-style HTTP API (v4/v5) for querying and mutating data in the Ditto
      Big Peer cloud platform. Authenticated with a static API key via Bearer
      token. The primary endpoint accepts DQL statements via POST to
      /api/v5/store/execute under a per-app cloud URL. A Swagger spec is
      published alongside each deployment.
    humanURL: https://docs.ditto.live/cloud/http-api/getting-started
    baseURL: https://{app-id}.cloud.dittolive.app
    tags:
      - REST
      - Cloud
      - Database
      - DQL
    properties:
      - type: Documentation
        url: https://docs.ditto.live/cloud/http-api/getting-started
      - type: OpenAPI
        url: openapi/ditto-live-cloud-http-api-openapi.yml
  - aid: ditto-live:edge-server-http-api
    name: Ditto Edge Server HTTP API
    description: >-
      Local HTTP API exposed by the Ditto Edge Server process running on-device
      or on an edge node. Provides endpoints for executing DQL queries, health
      checks, peer-presence status, and log retrieval. Supports configurable
      per-IP, per-API-key, and per-route rate limiting.
    humanURL: https://docs.ditto.live/edge-server/configuration/reference/http-server-resource
    tags:
