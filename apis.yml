---
aid: ditto-live
name: Ditto
description: >-
  Ditto is a peer-to-peer data sync platform for mobile and edge devices that
  enables real-time synchronization without requiring a central server, using
  Bluetooth, WiFi Direct, and LAN transports. The platform ships an embeddable
  SDK for iOS, Android, Flutter, React Native, JavaScript, .NET/C#, C++, Rust,
  Go, Java, and Kotlin, and backs it with an optional cloud tier (the "Big
  Peer") that bridges device meshes to the internet. Developers query and
  mutate data through DQL (Ditto Query Language) on-device, or via a cloud
  HTTP API (v5) against per-app endpoints. Ditto targets mission-critical
  mobile and edge workloads — retail, manufacturing, aviation, healthcare —
  where connectivity is intermittent or absent.
